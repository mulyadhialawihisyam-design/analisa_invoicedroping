<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Komprehensif: Full Jam, Closing, Success & Gagal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --closing: #e67e22; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background-color: var(--bg); font-size: 11px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; font-size: 18px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--primary); color: white; padding: 6px 2px; border: 1px solid #34495e; font-size: 9px; }
        td { padding: 6px 2px; border: 1px solid #ddd; text-align: center; font-weight: 600; }
        
        /* Fitur Interaktif */
        .clickable { cursor: pointer; text-decoration: underline; transition: 0.2s; }
        .clickable:hover { opacity: 0.7; background: rgba(0,0,0,0.1) !important; }

        .col-jam { font-weight: bold; background: #f8f9fa; border-right: 2px solid #333 !important; }
        .col-total-hour { background-color: #ebf5fb; color: #2980b9; border-right: 2px solid #333 !important; }
        .col-closing { background-color: #fff4e6; color: #d35400; border-right: 2px solid #333 !important; }
        .col-dropping { background-color: #e8f8f5; color: var(--success); }
        .col-gagal { background-color: #fdedec; color: var(--danger); }
        
        /* Modal Popup Style */
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:20px; border-radius:10px; width:550px; max-height:80%; overflow-y:auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eee; padding-bottom:10px; margin-bottom:10px; }
        .close-btn { cursor:pointer; font-weight:bold; font-size:20px; color:red; }
        .detail-item { padding:10px; border-bottom:1px solid #eee; font-size:11px; line-height: 1.5; }
        .detail-item b { color: var(--primary); font-size: 12px; }

        .summary-card { background: var(--primary); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; }
        .stat-box { text-align: center; }
        .stat-box span { font-size: 18px; font-weight: bold; display: block; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle" style="margin:0; font-size:14px;">Log Audit Detail</h3>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<div class="container">
    <h2>Akurasi Selesai Chekpoin VS Selesai Droping</h2>
    
    <textarea id="inputData" placeholder="Paste Data Excel A s/d K (Kode CL sampai Total Invoice)..."></textarea>
    <button onclick="prosesAudit()">ANALISA DATA LENGKAP</button>

    <div class="summary-card" id="summaryView" style="display:none;">
        <div class="stat-box"><small>Total IVC (Full)</small><span id="gT">0</span></div>
        <div class="stat-box"><small>Closing (45-59)</small><span id="gC" style="color: #ff9f43;">0</span></div>
        <div class="stat-box"><small>Drop Success</small><span id="gD" style="color: #58d68d;">0</span></div>
        <div class="stat-box"><small>Gagal Drop</small><span id="gG" style="color: #ec7063;">0</span></div>
    </div>

    <table id="mainTable" style="display:none;">
        <thead>
            <tr>
                <th rowspan="2">JAM</th>
                <th colspan="4" style="background: #34495e;">TOTAL PER JAM (00-59)</th>
                <th colspan="4" style="background: #e67e22;">CLOSING 15 MENIT (CP 45-59)</th>
                <th colspan="4" style="background: #27ae60;">DROP SUCCESS (DP 45-59)</th>
                <th colspan="4" style="background: #e74c3c;">GAGAL DROP (PENDING)</th>
            </tr>
            <tr>
                <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#2980b9">TOTAL</th>
                <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#d35400">TOTAL</th>
                <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#1e8449">TOTAL</th>
                <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#c0392b">TOTAL</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let detailData = {};

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function showDetail(key) {
    const list = detailData[key] || [];
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');
    
    modalTitle.innerText = `Log Rincian: ${key.replace(/_/g, ' ')}`;
    modalBody.innerHTML = list.length > 0 ? '' : 'Tidak ditemukan data rincian.';
    
    list.forEach(item => {
        modalBody.innerHTML += `
            <div class="detail-item">
                <b>${item.cl}</b> - ${item.cat}<br>
                <span style="color:#d35400">Waktu Checkpoint: ${item.cpFull}</span><br>
                <span style="color:${item.dpFull ? '#27ae60' : '#e74c3c'}">Waktu Dropping: ${item.dpFull || 'BELUM DROP / PENDING'}</span>
            </div>`;
    });
    
    document.getElementById('modalOverlay').style.display = 'flex';
}

function prosesAudit() {
    const rawData = document.getElementById('inputData').value;
    if(!rawData.trim()) return;

    detailData = {}; // Reset container detail
    const lines = rawData.trim().split('\n');
    const stats = {};
    
    // Inisialisasi Jam 00-23
    for (let i = 0; i < 24; i++) {
        let h = (i < 10 ? '0' + i : i).toString();
        stats[h] = { 
            hs:0, hm:0, hb:0, ht:0, // Full Hour
            cs:0, cm:0, cb:0, ct:0, // Closing 15m
            ds:0, dm:0, db:0, dt:0  // Drop Success 15m
        };
    }

    let grandT=0, grandC=0, grandD=0;

    lines.forEach(line => {
        const col = line.split('\t');
        if (col.length >= 11) {
            const clNo = col[0]; // Kolom A
            const cat = (col[2] || "").toUpperCase(); // Kolom C
            const rawCP = col[7] || ""; // Kolom H (Waktu Selesai Checkpoint)
            const rawDP = col[9] || ""; // Kolom J (Waktu Selesai Dropping)
            const qty = parseInt(col[10]) || 0; // Kolom K

            // Pecah waktu untuk identifikasi jam dan menit
            const timeCPPart = rawCP.split(' ')[1]; 
            
            if (timeCPPart) {
                const [hh, mm] = timeCPPart.split(':');
                if (stats[hh]) {
                    // 1. DATA FULL JAM (Semua menit 00-59)
                    stats[hh].ht += qty; grandT += qty;
                    if(cat.includes("SINGLE")) stats[hh].hs += qty;
                    else if(cat.includes("MULTIPLE")) stats[hh].hm += qty;
                    else if(cat.includes("BULK")) stats[hh].hb += qty;

                    // 2. DATA CLOSING (Hanya menit 45-59)
                    if (parseInt(mm) >= 45) {
                        stats[hh].ct += qty; grandC += qty;
                        if(cat.includes("SINGLE")) stats[hh].cs += qty;
                        else if(cat.includes("MULTIPLE")) stats[hh].cm += qty;
                        else if(cat.includes("BULK")) stats[hh].cb += qty;

                        // Simpan detail untuk klik popup Closing
                        const cKey = `Closing_Jam_${hh}`;
                        if(!detailData[cKey]) detailData[cKey] = [];
                        detailData[cKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP });

                        let successThisItem = false;
                        if (rawDP) {
                            const timeDPPart = rawDP.split(' ')[1];
                            const [hhD, mmD] = timeDPPart.split(':');
                            
                            // Validasi: Harus di jam yang sama dan menit >= 45
                            if (hhD === hh && parseInt(mmD) >= 45) {
                                successThisItem = true;
                                stats[hh].dt += qty; grandD += qty;
                                if(cat.includes("SINGLE")) stats[hh].ds += qty;
                                else if(cat.includes("MULTIPLE")) stats[hh].dm += qty;
                                else if(cat.includes("BULK")) stats[hh].db += qty;

                                // Simpan detail untuk klik popup Success
                                const sKey = `Success_Jam_${hh}`;
                                if(!detailData[sKey]) detailData[sKey] = [];
                                detailData[sKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP });
                            }
                        }

                        // 3. Simpan detail untuk klik popup Gagal Drop
                        if (!successThisItem) {
                            const gKey = `Gagal_Drop_Jam_${hh}`;
                            if(!detailData[gKey]) detailData[gKey] = [];
                            detailData[gKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP });
                        }
                    }
                }
            }
        }
    });

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    Object.keys(stats).sort().forEach(h => {
        const d = stats[h];
        tbody.innerHTML += `<tr>
            <td class="col-jam">JAM ${h}:00</td>
            <td>${d.hs}</td><td>${d.hm}</td><td>${d.hb}</td><td class="col-total-hour">${d.ht}</td>
            <td>${d.cs}</td><td>${d.cm}</td><td>${d.cb}</td>
            <td class="col-closing clickable" onclick="showDetail('Closing_Jam_${h}')">${d.ct}</td>
            <td class="col-dropping">${d.ds}</td><td class="col-dropping">${d.dm}</td><td class="col-dropping">${d.db}</td>
            <td class="clickable" style="background:#1e8449; color:white;" onclick="showDetail('Success_Jam_${h}')">${d.dt}</td>
            <td class="col-gagal">${d.cs-d.ds}</td><td class="col-gagal">${d.cm-d.dm}</td><td class="col-gagal">${d.cb-d.db}</td>
            <td class="clickable" style="background:#c0392b; color:white;" onclick="showDetail('Gagal_Drop_Jam_${h}')">${d.ct-d.dt}</td>
        </tr>`;
    });

    // Update Summary Card
    document.getElementById('gT').innerText = grandT.toLocaleString('id-ID');
    document.getElementById('gC').innerText = grandC.toLocaleString('id-ID');
    document.getElementById('gD').innerText = grandD.toLocaleString('id-ID');
    document.getElementById('gG').innerText = (grandC - grandD).toLocaleString('id-ID');
    
    document.getElementById('summaryView').style.display = 'flex';
    document.getElementById('mainTable').style.display = 'table';
}
</script>
</body>
</html>
