<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Komprehensif: Final Presentation Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --closing: #e67e22; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --focus: #fff59d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background-color: var(--bg); font-size: 11px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; font-size: 18px; }
        
        textarea { width: 100%; height: 100px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; margin-bottom: 10px; transition: 0.3s; }
        button:hover { background: #34495e; transform: translateY(-1px); }

        /* --- STICKY HEADER (FREEZE) --- */
        .table-wrapper { max-height: 75vh; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        
        thead { position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: var(--primary); color: white; padding: 10px 2px; border: 1px solid #34495e; font-size: 9px; }
        
        /* Memastikan baris tanggal juga sticky jika diinginkan, namun di sini kita fokus ke header utama */
        .date-separator-row td { position: sticky; top: 58px; z-index: 90; }

        td { padding: 8px 2px; border: 1px solid #ddd; text-align: center; font-weight: 600; transition: all 0.3s ease; background: white; }

        /* --- FITUR PRESENTASI PRO --- */
        .row-focus { 
            background-color: var(--focus) !important; 
            transform: scale(1.01); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            z-index: 50;
            position: relative;
        }
        
        .row-focus td { 
            font-size: 15px !important; 
            color: #000 !important;
            padding: 15px 2px !important;
            border-top: 2px solid #f1c40f !important;
            border-bottom: 2px solid #f1c40f !important;
            background-color: var(--focus) !important;
        }

        .date-separator { background-color: #ecf0f1; color: #2c3e50; font-size: 14px; font-weight: bold; text-align: left; padding: 12px; border-left: 5px solid var(--accent); }

        .clickable { cursor: pointer; text-decoration: underline; transition: 0.2s; position: relative; z-index: 60; }
        .clickable:hover { opacity: 0.7; background: rgba(0,0,0,0.1) !important; }

        .col-jam { font-weight: bold; background: #f8f9fa; border-right: 2px solid #333 !important; }
        .col-total-hour { background-color: #ebf5fb; color: #2980b9; border-right: 2px solid #333 !important; }
        .col-closing { background-color: #fff4e6; color: #d35400; border-right: 2px solid #333 !important; }
        .col-dropping { background-color: #e8f8f5; color: var(--success); }
        .col-gagal { background-color: #fdedec; color: var(--danger); }
        
        /* Modal Popup & Loading */
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:550px; max-height:85%; overflow-y:auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; text-align: center; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eee; padding-bottom:10px; margin-bottom:15px; }
        .close-btn { cursor:pointer; font-weight:bold; font-size:24px; color:red; }
        .detail-item { padding:12px; border-bottom:1px solid #eee; font-size:12px; line-height: 1.6; text-align: left; }

        #loadingLayer { display: none; padding: 20px; }
        #loadingLayer img { width: 120px; height: 120px; border-radius: 10px; }

        .summary-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; }
        .stat-box { text-align: center; }
        .stat-box span { font-size: 22px; font-weight: bold; display: block; }
        
        tr:not(.date-separator-row):hover td { background-color: #f1f2f6; cursor: pointer; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle" style="margin:0; font-size:16px;">Log Audit Detail</h3>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
        <div id="loadingLayer">
            <img id="loadingImg" src="" alt="Loading...">
            <p id="loadingText" style="font-weight:bold; color:var(--accent); font-size:14px; margin-top:10px;"></p>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<div class="container">
    <h2>Akurasi Checkpoint VS Dropping (Sticky & Interactive)</h2>
    
    <textarea id="inputData" placeholder="Paste data Excel Anda di sini..."></textarea>
    <button onclick="prosesAudit()">MULAI ANALISA DATA</button>

    <div class="summary-card" id="summaryView" style="display:none;">
        <div class="stat-box"><small>Total IVC</small><span id="gT">0</span></div>
        <div class="stat-box"><small>Closing (45-59)</small><span id="gC" style="color: #ff9f43;">0</span></div>
        <div class="stat-box"><small>Drop Success</small><span id="gD" style="color: #58d68d;">0</span></div>
        <div class="stat-box"><small>Gagal Drop</small><span id="gG" style="color: #ec7063;">0</span></div>
    </div>

    <div class="table-wrapper" id="wrapper" style="display:none;">
        <table id="mainTable">
            <thead>
                <tr>
                    <th rowspan="2">JAM</th>
                    <th colspan="4" style="background: #34495e;">TOTAL PER JAM (00-59)</th>
                    <th colspan="4" style="background: #e67e22;">CLOSING 15 MENIT (CP 45-59)</th>
                    <th colspan="4" style="background: #27ae60;">DROP SUCCESS (DP 45-59)</th>
                    <th colspan="4" style="background: #e74c3c;">GAGAL DROP (PENDING)</th>
                </tr>
                <tr>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#2980b9">TOTAL</th>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#d35400">TOTAL</th>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#1e8449">TOTAL</th>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th style="background:#c0392b">TOTAL</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let detailData = {};

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function toggleFocus(row) {
    document.querySelectorAll('.row-focus').forEach(r => { if(r !== row) r.classList.remove('row-focus'); });
    row.classList.toggle('row-focus');
}

function showDetail(event, key) {
    event.stopPropagation();
    const list = detailData[key] || [];
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');
    const loadingLayer = document.getElementById('loadingLayer');
    const loadingImg = document.getElementById('loadingImg');
    const loadingText = document.getElementById('loadingText');
    
    // Logika Ganti Gambar Loading
    if (key.includes('Success')) {
        // Gambar Paket/Kurir untuk Drop Success
        loadingImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZleHh6ZzR0bmRwam56Z3B6bmRwam56Z3B6bmRwam56Z3B6bmRwanA5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/L1fS0P74JvA4H6kG7I/giphy.gif"; 
        loadingText.innerText = "Membuka manifes paket sukses...";
    } else {
        // Gambar Loading Standar untuk lainnya
        loadingImg.src = "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjVsYTc5bG03NzZ4MmYwanFsbnZzaHp3ajl4NWZlMG45ejg4NXl1aCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/YMM6g7x45coCKdrDoj/giphy.gif";
        loadingText.innerText = "Menyusun rincian data...";
    }

    modalTitle.innerText = `Rincian: ${key.replace(/_/g, ' ')}`;
    document.getElementById('modalOverlay').style.display = 'flex';
    
    modalBody.style.display = 'none';
    loadingLayer.style.display = 'block';

    setTimeout(() => {
        loadingLayer.style.display = 'none';
        modalBody.style.display = 'block';
        modalBody.innerHTML = list.length > 0 ? '' : 'Tidak ditemukan rincian.';
        
        list.forEach(item => {
            modalBody.innerHTML += `
                <div class="detail-item">
                    <b>${item.cl}</b> | ${item.cat}<br>
                    <span style="color:#666">📅 Tanggal: ${item.date}</span><br>
                    <span style="color:#d35400">🕒 CP: ${item.cpFull}</span><br>
                    <span style="color:${item.dpFull ? '#27ae60' : '#e74c3c'}">🚚 DP: ${item.dpFull || 'PENDING'}</span>
                </div>`;
        });
    }, 800);
}

function prosesAudit() {
    const rawData = document.getElementById('inputData').value;
    if(!rawData.trim()) return;

    detailData = {}; 
    const lines = rawData.trim().split('\n');
    const dateGroups = {}; 

    let grandT=0, grandC=0, grandD=0;

    lines.forEach(line => {
        const col = line.split('\t');
        if (col.length >= 11) {
            const clNo = col[0]; 
            const cat = (col[2] || "").toUpperCase(); 
            const rawCP = col[7] || ""; 
            const rawDP = col[9] || ""; 
            const qty = parseInt(col[10]) || 0; 

            const cpParts = rawCP.split(' ');
            if (cpParts.length >= 2) {
                const datePart = cpParts[0];
                const timeCPPart = cpParts[1];
                
                if (!dateGroups[datePart]) {
                    dateGroups[datePart] = {};
                    for (let i = 0; i < 24; i++) {
                        let h = i.toString().padStart(2, '0');
                        dateGroups[datePart][h] = { hs:0, hm:0, hb:0, ht:0, cs:0, cm:0, cb:0, ct:0, ds:0, dm:0, db:0, dt:0 };
                    }
                }

                const [hh, mm] = timeCPPart.split(':');
                const targetJam = dateGroups[datePart][hh];

                if (targetJam) {
                    targetJam.ht += qty; grandT += qty;
                    if(cat.includes("SINGLE")) targetJam.hs += qty;
                    else if(cat.includes("MULTIPLE")) targetJam.hm += qty;
                    else if(cat.includes("BULK")) targetJam.hb += qty;

                    if (parseInt(mm) >= 45) {
                        targetJam.ct += qty; grandC += qty;
                        if(cat.includes("SINGLE")) targetJam.cs += qty;
                        else if(cat.includes("MULTIPLE")) targetJam.cm += qty;
                        else if(cat.includes("BULK")) targetJam.cb += qty;

                        const cleanDate = datePart.replace(/\//g, '-');
                        const cKey = `Closing_Tgl_${cleanDate}_Jam_${hh}`;
                        if(!detailData[cKey]) detailData[cKey] = [];
                        detailData[cKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP, date: datePart });

                        let successThisItem = false;
                        if (rawDP) {
                            const dpParts = rawDP.split(' ');
                            if(dpParts.length >= 2) {
                                const [hhD, mmD] = dpParts[1].split(':');
                                if (dpParts[0] === datePart && hhD === hh && parseInt(mmD) >= 45) {
                                    successThisItem = true;
                                    targetJam.dt += qty; grandD += qty;
                                    if(cat.includes("SINGLE")) targetJam.ds += qty;
                                    else if(cat.includes("MULTIPLE")) targetJam.dm += qty;
                                    else if(cat.includes("BULK")) targetJam.db += qty;

                                    const sKey = `Success_Tgl_${cleanDate}_Jam_${hh}`;
                                    if(!detailData[sKey]) detailData[sKey] = [];
                                    detailData[sKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP, date: datePart });
                                }
                            }
                        }

                        if (!successThisItem) {
                            const gKey = `Gagal_Drop_Tgl_${cleanDate}_Jam_${hh}`;
                            if(!detailData[gKey]) detailData[gKey] = [];
                            detailData[gKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP, date: datePart });
                        }
                    }
                }
            }
        }
    });

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    Object.keys(dateGroups).sort().forEach(tgl => {
        tbody.innerHTML += `<tr class="date-separator-row"><td colspan="17" class="date-separator">📅 TANGGAL: ${tgl}</td></tr>`;
        
        const jams = dateGroups[tgl];
        Object.keys(jams).sort().forEach(h => {
            const d = jams[h];
            if (d.ht > 0) {
                const cleanDate = tgl.replace(/\//g, '-');
                tbody.innerHTML += `<tr onclick="toggleFocus(this)">
                    <td class="col-jam">JAM ${h}:00</td>
                    <td>${d.hs}</td><td>${d.hm}</td><td>${d.hb}</td><td class="col-total-hour">${d.ht}</td>
                    <td>${d.cs}</td><td>${d.cm}</td><td>${d.cb}</td>
                    <td class="col-closing clickable" onclick="showDetail(event, 'Closing_Tgl_${cleanDate}_Jam_${h}')">${d.ct}</td>
                    <td class="col-dropping">${d.ds}</td><td class="col-dropping">${d.dm}</td><td class="col-dropping">${d.db}</td>
                    <td class="clickable" style="background:#1e8449; color:white;" onclick="showDetail(event, 'Success_Tgl_${cleanDate}_Jam_${h}')">${d.dt}</td>
                    <td class="col-gagal">${d.cs-d.ds}</td><td class="col-gagal">${d.cm-d.dm}</td><td class="col-gagal">${d.cb-d.db}</td>
                    <td class="clickable" style="background:#c0392b; color:white;" onclick="showDetail(event, 'Gagal_Drop_Tgl_${cleanDate}_Jam_${h}')">${d.ct-d.dt}</td>
                </tr>`;
            }
        });
    });

    document.getElementById('gT').innerText = grandT.toLocaleString('id-ID');
    document.getElementById('gC').innerText = grandC.toLocaleString('id-ID');
    document.getElementById('gD').innerText = grandD.toLocaleString('id-ID');
    document.getElementById('gG').innerText = (grandC - grandD).toLocaleString('id-ID');
    
    document.getElementById('summaryView').style.display = 'flex';
    document.getElementById('wrapper').style.display = 'block';
}
</script>
</body>
</html>
