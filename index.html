<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Robo V8.1: Full Production Code</title>
    <style>
        /* CSS LENGKAP - TANPA RINGKASAN */
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --bg: #f4f7f6; 
            --success: #27ae60; 
            --danger: #e74c3c; 
            --focus-color: #fff59d; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: var(--bg); 
            font-size: 11px; 
        }

        .container { 
            max-width: 100%; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        
        h2 { color: var(--primary); margin-top: 0; border-left: 5px solid var(--accent); padding-left: 10px; }

        textarea { 
            width: 100%; 
            height: 100px; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-family: 'Courier New', monospace; 
            box-sizing: border-box; 
            margin-bottom: 10px; 
            font-size: 10px; 
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--accent); }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 14px; 
            margin-bottom: 15px; 
            transition: 0.3s; 
        }
        button:hover { background: #34495e; transform: translateY(-1px); }

        /* TABEL UTAMA */
        .table-wrapper { 
            max-height: 70vh; 
            overflow-y: auto; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            margin-top: 15px; 
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        thead { position: sticky; top: 0; z-index: 100; }
        th { 
            background: var(--primary); 
            color: white; 
            padding: 10px 2px; 
            border: 1px solid #34495e; 
            font-size: 9px; 
            text-transform: uppercase;
        }
        td { 
            padding: 8px 2px; 
            border: 1px solid #ddd; 
            text-align: center; 
            transition: all 0.3s;
        }

        /* EFEK FOKUS CEMBUNG */
        tr.focus-row td { 
            background-color: var(--focus-color) !important; 
            font-weight: 900 !important; 
            font-size: 13px !important; 
            color: #000 !important; 
            padding: 18px 2px !important;
            border-top: 3px solid #222 !important; 
            border-bottom: 3px solid #222 !important; 
            transform: scale(1.01);
        }
        
        .date-separator { 
            background-color: #ecf0f1; 
            color: #2c3e50; 
            font-size: 14px; 
            font-weight: bold; 
            text-align: left; 
            padding: 12px; 
            border-left: 8px solid var(--accent); 
        }

        .clickable { 
            cursor: pointer; 
            text-decoration: underline; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .clickable:hover { opacity: 0.7; transform: scale(1.1); }

        /* POPUP UTAMA */
        #modalOverlay { 
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.85); 
            z-index:2000; 
            justify-content:center; 
            align-items:center; 
            backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background:white; 
            padding:25px; 
            border-radius:15px; 
            width:850px; 
            max-height:90%; 
            overflow-y:auto; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* NESTED POPUP (INVOICE LIST) */
        #nestedOverlay { 
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.7); 
            z-index:3000; 
            justify-content:center; 
            align-items:center; 
        }
        .nested-content { 
            background:#2c3e50; 
            color:white; 
            padding:20px; 
            border-radius:12px; 
            width:500px; 
            max-height:75%; 
            overflow-y:auto; 
            border: 2px solid var(--accent); 
        }

        /* SECTION HEADERS DALAM POPUP */
        .section-header { 
            background: #eee; 
            padding: 10px 15px; 
            border-radius: 8px; 
            margin: 20px 0 10px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 6px solid #555; 
        }
        .section-header.danger { border-left-color: var(--danger); background: #fff5f5; }
        .section-badge { 
            background: #333; 
            color: white; 
            padding: 3px 12px; 
            border-radius: 12px; 
            font-size: 10px; 
            font-weight: bold;
        }

        /* CARD CL */
        .cl-card { 
            padding:12px; 
            border:1px solid #ddd; 
            margin-bottom:8px; 
            border-radius:10px; 
            background: #fff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.2s;
        }
        .cl-card:hover { border-color: var(--accent); background: #f0faff; }
        .cl-main-info { flex-grow: 1; }
        .cl-main-info b { font-size: 14px; }
        
        .btn-view-inv { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            white-space: nowrap; 
            margin-left: 15px; 
        }
        .btn-view-inv:hover { background: #2980b9; }

        .inv-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 15px; 
        }
        .inv-pill { 
            background: white; 
            color: #2c3e50; 
            padding: 6px; 
            border-radius: 4px; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            font-size: 11px;
        }

        /* SUMMARY CARDS */
        .summary-card { 
            background: var(--primary); 
            color: white; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-around; 
            text-align: center;
        }
        .stat-box small { text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .stat-box span { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }
        
        #apiLoading { display: none; text-align: center; padding: 40px; }
        #apiLoading img { width: 120px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid var(--accent); padding-bottom:10px; margin-bottom: 15px;">
            <h3 id="modalTitle" style="margin:0; text-transform: uppercase; color: var(--primary);">ANALISA PERIODE</h3>
            <span style="cursor:pointer; font-weight:bold; font-size:32px; color:var(--danger);" onclick="closeModal()">&times;</span>
        </div>
        
        <div id="apiLoading">
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjVsYTc5bG03NzZ4MmYwanFsbnZzaHp3ajl4NWZlMG45ejg4NXl1aCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/YMM6g7x45coCKdrDoj/giphy.gif">
            <p style="font-weight:bold; color:var(--primary);">MENGHUBUNGKAN KE DATABASE API...</p>
        </div>

        <div id="modalBody"></div>
    </div>
</div>

<div id="nestedOverlay" onclick="closeNested()">
    <div class="nested-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 1px solid #555; padding-bottom: 10px;">
            <h4 id="nestedTitle" style="margin:0; letter-spacing: 1px;">LIST INVOICE</h4>
            <span style="cursor:pointer; font-weight:bold; font-size:24px;" onclick="closeNested()">&times;</span>
        </div>
        <div id="nestedBody"></div>
    </div>
</div>

<div class="container">
    <h2>📊 Audit Robo V8.1 (Full Analytics)</h2>
    <textarea id="inputData" placeholder="Tempel data Excel (Kolom A-K) di sini..."></textarea>
    <button onclick="prosesAudit()">MULAI AUDIT DATA</button>

    <div class="summary-card" id="summaryView" style="display:none;">
        <div class="stat-box"><small>TOTAL INV</small><span id="gT">0</span></div>
        <div class="stat-box"><small>CLOSING CP</small><span id="gC" style="color: #ffb142;">0</span></div>
        <div class="stat-box"><small>DROP SUCCESS</small><span id="gD" style="color: #1dd1a1;">0</span></div>
        <div class="stat-box"><small>PENDING</small><span id="gG" style="color: #ff6b6b;">0</span></div>
    </div>

    <div class="table-wrapper" id="wrapper" style="display:none;">
        <table id="mainTable">
            <thead>
                <tr>
                    <th rowspan="2">JAM</th>
                    <th colspan="4" style="background: #34495e;">TOTAL JAM</th>
                    <th colspan="4" style="background: #d35400;">CLOSING CP (45-59)</th>
                    <th colspan="4" style="background: #1e8449;">SUCCESS (DP 45-59)</th>
                    <th colspan="4" style="background: #c0392b;">GAGAL DROP</th>
                </tr>
                <tr>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th>TTL</th>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th>TTL</th>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th>TTL</th>
                    <th>SGL</th><th>MLT</th><th>BLK</th><th>TTL</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
/* JAVASCRIPT LENGKAP - TANPA RINGKASAN */
let detailData = {};
let currentApiInvoices = {};
const API_URL = "https://script.google.com/macros/s/AKfycbwI5k5kuuKHO0myhyq1zhFOpdcK0vixBQKJ3kMwmlO0DywYc1aWQaLc3TFCDvmAJa8G/exec";

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function closeNested() { document.getElementById('nestedOverlay').style.display = 'none'; }

function toggleFocus(row) {
    document.querySelectorAll('tr').forEach(r => r.classList.remove('focus-row'));
    row.classList.add('focus-row');
}

// FUNGSI TAMPILKAN LIST INVOICE (NESTED POPUP)
function showInvoiceList(clCode) {
    const list = currentApiInvoices[clCode] || [];
    const nestedBody = document.getElementById('nestedBody');
    document.getElementById('nestedTitle').innerText = "CL: " + clCode;
    
    let html = `<div class="inv-grid">`;
    if(list.length === 0) {
        html += `<p style="grid-column: span 3; text-align:center; padding:20px; color:#ff7675;">Data invoice tidak ditemukan di API.</p>`;
    } else {
        list.forEach(inv => { 
            html += `<div class="inv-pill">${inv}</div>`; 
        });
    }
    html += `</div>`;
    
    nestedBody.innerHTML = html;
    document.getElementById('nestedOverlay').style.display = 'flex';
}

// FUNGSI TAMPILKAN DETAIL PERIODE (POPUP UTAMA DENGAN DEDUPLIKASI)
async function showDetail(event, key) {
    event.stopPropagation();
    const listRaw = detailData[key] || [];
    
    // LOGIKA DEDUPLIKASI: Memastikan CL yang sama tidak muncul dobel di list
    const uniqueMap = new Map();
    listRaw.forEach(item => {
        if(!uniqueMap.has(item.cl)) {
            uniqueMap.set(item.cl, item);
        }
    });
    const list = Array.from(uniqueMap.values());

    const modalBody = document.getElementById('modalBody');
    const loading = document.getElementById('apiLoading');
    document.getElementById('modalTitle').innerText = key.replace(/_/g, ' ');
    document.getElementById('modalOverlay').style.display = 'flex';
    
    modalBody.innerHTML = '';
    modalBody.style.display = 'none';
    loading.style.display = 'block';

    try {
        // AMBIL DATA DARI API
        const response = await fetch(API_URL);
        currentApiInvoices = await response.json();
        
        loading.style.display = 'none';
        modalBody.style.display = 'block';

        // DEFINISI FASE MENIT
        const stages = [
            { label: "SANGAT KRITIS (Menit 55-59)", filter: (m) => m >= 55, cls: "danger" },
            { label: "FASE AKHIR (Menit 50-54)", filter: (m) => m >= 50 && m < 55, cls: "" },
            { label: "FASE AWAL (Menit 45-49)", filter: (m) => m >= 45 && m < 50, cls: "" }
        ];

        let html = "";
        stages.forEach(stage => {
            const filteredList = list.filter(item => {
                const mm = parseInt(item.cpFull.split(' ')[1].split(':')[1]);
                return stage.filter(mm);
            });

            if(filteredList.length > 0) {
                // HITUNG TOTAL INVOICE NYATA DARI API UNTUK SECTION INI
                const totalInvSection = filteredList.reduce((acc, curr) => {
                    const apiQty = currentApiInvoices[curr.cl] ? currentApiInvoices[curr.cl].length : 0;
                    return acc + apiQty;
                }, 0);

                html += `
                    <div class="section-header ${stage.cls}">
                        <b>${stage.label}</b>
                        <span class="section-badge">${totalInvSection} INV DETECTED</span>
                    </div>`;
                
                filteredList.forEach(item => {
                    // AMBIL JUMLAH INVOICE DARI DATABASE API
                    const realQtyFromApi = currentApiInvoices[item.cl] ? currentApiInvoices[item.cl].length : 0;
                    
                    html += `
                        <div class="cl-card">
                            <div class="cl-main-info">
                                <b style="color:var(--accent);">${item.cl}</b> 
                                <span style="font-size:10px; color:#7f8c8d; margin-left:10px;">${item.cat}</span><br>
                                <small>CP: <b>${item.cpFull}</b> | DP: <b style="color:var(--success);">${item.dpFull || "-"}</b></small>
                            </div>
                            <button class="btn-view-inv" onclick="showInvoiceList('${item.cl}')">DETAIL ${realQtyFromApi} INV</button>
                        </div>`;
                });
            }
        });
        
        modalBody.innerHTML = html || "<p style='text-align:center; padding:20px;'>Tidak ada data CL pada periode menit ini.</p>";

    } catch (error) {
        loading.style.display = 'none';
        modalBody.style.display = 'block';
        modalBody.innerHTML = `<div style="text-align:center; color:var(--danger); padding:20px;"><h3>Gagal Sinkron API</h3><p>${error.message}</p></div>`;
    }
}

// FUNGSI ANALISA DATA EXCEL
function prosesAudit() {
    const rawData = document.getElementById('inputData').value.trim();
    if(!rawData) { alert("Data kosong!"); return; }

    detailData = {}; 
    const lines = rawData.split('\n');
    const dateGroups = {}; 
    let gT=0, gC=0, gD=0;

    lines.forEach(line => {
        const col = line.split('\t');
        const hasColl = col.length >= 11; 
        
        const clNo = (hasColl ? col[6] : col[0] || "").trim();
        const cat = (hasColl ? col[7] : col[2] || "").toUpperCase();
        const rawCP = (hasColl ? col[9] : col[3] || "").trim();
        const rawDP = (hasColl ? col[8] : col[4] || "").trim();
        const qty = parseInt(hasColl ? col[10] : col[5]) || 0;

        if (rawCP && rawCP.includes(' ')) {
            const parts = rawCP.split(' ');
            const tgl = parts[0];
            const jamFull = parts[1];
            
            if (jamFull && jamFull.includes(':')) {
                const hh = jamFull.split(':')[0].padStart(2, '0');
                const mm = parseInt(jamFull.split(':')[1]);

                if (!dateGroups[tgl]) {
                    dateGroups[tgl] = {};
                    for (let i=0; i<24; i++) {
                        let hStr = i.toString().padStart(2, '0');
                        dateGroups[tgl][hStr] = { hs:0, hm:0, hb:0, ht:0, cs:0, cm:0, cb:0, ct:0, ds:0, dm:0, db:0, dt:0 };
                    }
                }

                const dJ = dateGroups[tgl][hh];
                if (dJ) {
                    // TOTAL PER JAM
                    dJ.ht += qty; gT += qty;
                    if(cat.includes("SGL") || cat.includes("SINGLE")) dJ.hs += qty;
                    else if(cat.includes("MLT") || cat.includes("MULTIPLE")) dJ.hm += qty;
                    else dJ.hb += qty;

                    // FILTER MENIT 45-59 (CLOSING)
                    if (mm >= 45) {
                        dJ.ct += qty; gC += qty;
                        if(cat.includes("SGL") || cat.includes("SINGLE")) dJ.cs += qty;
                        else if(cat.includes("MLT") || cat.includes("MULTIPLE")) dJ.cm += qty;
                        else dJ.cb += qty;

                        // Simpan Data untuk Popup Closing
                        const cKey = `Closing_Tgl_${tgl.replace(/\//g,'-')}_Jam_${hh}`;
                        if(!detailData[cKey]) detailData[cKey] = [];
                        detailData[cKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP });

                        // VALIDASI SUCCESS DROP
                        let isSuccess = false;
                        if(rawDP && rawDP.includes(' ') && rawDP !== "-") {
                            const dpParts = rawDP.split(' ');
                            if(dpParts[0] === tgl && dpParts[1].split(':')[0].padStart(2, '0') === hh && parseInt(dpParts[1].split(':')[1]) >= 45) {
                                isSuccess = true;
                                dJ.dt += qty; gD += qty;
                                if(cat.includes("SGL") || cat.includes("SINGLE")) dJ.ds += qty;
                                else if(cat.includes("MLT") || cat.includes("MULTIPLE")) dJ.dm += qty;
                                else dJ.db += qty;

                                const sKey = `Success_Tgl_${tgl.replace(/\//g,'-')}_Jam_${hh}`;
                                if(!detailData[sKey]) detailData[sKey] = [];
                                detailData[sKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP });
                            }
                        }
                        
                        // DATA GAGAL DROP
                        if(!isSuccess) {
                            const gKey = `Gagal_Drop_Tgl_${tgl.replace(/\//g,'-')}_Jam_${hh}`;
                            if(!detailData[gKey]) detailData[gKey] = [];
                            detailData[gKey].push({ cl: clNo, cat: cat, cpFull: rawCP, dpFull: rawDP });
                        }
                    }
                }
            }
        }
    });

    // RENDER TABEL
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    Object.keys(dateGroups).sort().forEach(tgl => {
        tbody.innerHTML += `<tr><td colspan="17" class="date-separator">📅 TANGGAL: ${tgl}</td></tr>`;
        Object.keys(dateGroups[tgl]).sort().forEach(h => {
            const d = dateGroups[tgl][h];
            if (d.ht > 0) {
                const cD = tgl.replace(/\//g,'-');
                tbody.innerHTML += `
                <tr onclick="toggleFocus(this)">
                    <td style="font-weight:bold; background:#f8f9fa;">JAM ${h}:00</td>
                    <td>${d.hs}</td><td>${d.hm}</td><td>${d.hb}</td><td style="background:#ebf5fb; font-weight:bold;">${d.ht}</td>
                    <td>${d.cs}</td><td>${d.cm}</td><td>${d.cb}</td>
                    <td class="clickable" style="background:#fff4e6; color:#d35400;" onclick="showDetail(event, 'Closing_Tgl_${cD}_Jam_${h}')">${d.ct}</td>
                    <td style="color:#27ae60">${d.ds}</td><td style="color:#27ae60">${d.dm}</td><td style="color:#27ae60">${d.db}</td>
                    <td class="clickable" style="background:#1e8449; color:white;" onclick="showDetail(event, 'Success_Tgl_${cD}_Jam_${h}')">${d.dt}</td>
                    <td style="color:#e74c3c">${d.cs-d.ds}</td><td style="color:#e74c3c">${d.cm-d.dm}</td><td style="color:#e74c3c">${d.cb-d.db}</td>
                    <td class="clickable" style="background:#c0392b; color:white;" onclick="showDetail(event, 'Gagal_Drop_Tgl_${cD}_Jam_${h}')">${d.ct-d.dt}</td>
                </tr>`;
            }
        });
    });

    // UPDATE SUMMARY
    document.getElementById('gT').innerText = gT.toLocaleString();
    document.getElementById('gC').innerText = gC.toLocaleString();
    document.getElementById('gD').innerText = gD.toLocaleString();
    document.getElementById('gG').innerText = (gC - gD).toLocaleString();
    document.getElementById('summaryView').style.display = 'flex';
    document.getElementById('wrapper').style.display = 'block';
}
</script>
</body>
</html>
